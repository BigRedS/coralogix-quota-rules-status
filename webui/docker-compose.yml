# Read-only deployment of the quota-rules-status webui.
#
# Build from local source and run:
#   docker compose up --build
#
# Then open http://localhost:8765.
#
# The build context is the repo root because the webui imports the
# internal/quotarules package from the parent Go module.

services:
  cx-rules-status:
    build:
      context: ..
      dockerfile: webui/Dockerfile
    ports:
      - "127.0.0.1:8765:8765"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
